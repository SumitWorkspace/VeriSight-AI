services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////app/data/fake_reviews.db
      MODEL_DIR: /app/model/saved_model
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./model/saved_model:/app/model/saved_model
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
