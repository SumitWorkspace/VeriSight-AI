services:
  - type: web
    name: verisight-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fake_reviews.db
      - key: MODEL_DIR
        value: ../model/saved_model
      - key: FRONTEND_ORIGIN
        value: https://verisight.vercel.app
